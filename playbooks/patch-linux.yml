---
- name: Patch all Linux servers
  hosts: linux
  become: true

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Show reboot status
      debug:
        msg: "{{ inventory_hostname }}: Reboot required = {{ reboot_required.stat.exists }}"
