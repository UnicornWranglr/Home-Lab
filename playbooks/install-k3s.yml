---
- name: Install K3s on control plane
  hosts: LAB-K8S-001
  become: true
  tasks:
    - name: Download and install K3s as server
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        state: present
        timeout: 60

    - name: Read node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Set token fact
      set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

- name: Install K3s on worker nodes
  hosts: LAB-K8S-002,LAB-K8S-003
  become: true
  vars:
    k3s_server_ip: "192.168.155.200"
  tasks:
    - name: Join workers to cluster
      shell: >
        curl -sfL https://get.k3s.io | 
        K3S_URL=https://{{ k3s_server_ip }}:6443
        K3S_TOKEN={{ hostvars['LAB-K8S-001']['k3s_node_token'] }}
        sh -
      args:
        creates: /usr/local/bin/k3s
